apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-ssh-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-ssh-agent
  template:
    metadata:
      labels:
        app: jenkins-ssh-agent
    spec:
      containers:
      - name: ssh-agent
        image: jenkins/ssh-agent:latest-jdk17
        env:
        - name: JENKINS_AGENT_SSH_PUBKEY
          value: "ssh-rsa  aphi@Aphi"
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-ssh-agent-svc
spec:
  selector:
    app: jenkins-ssh-agent
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
